name: Build

on:
  push:
    branches: [master]
    tags:   ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mantle-linux
            container: registry.gitlab.steampowered.com/steam/steamrt-sniper/sdk:latest
          - os: windows-latest
            artifact: mantle-windows
            container: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    name: ${{ matrix.artifact }}

    env:
      VULKAN_VERSION: "1.4.341.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz" \
            -O vulkansdk.tar.xz
          mkdir -p ~/vulkansdk
          tar -xf vulkansdk.tar.xz -C ~/vulkansdk
          source ~/vulkansdk/${VULKAN_VERSION}/setup-env.sh
          echo "VULKAN_SDK=${VULKAN_SDK}" >> $GITHUB_ENV
          echo "PATH=${PATH}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          $installer = "vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/$installer" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\${env:VULKAN_VERSION}\Bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp -r build/target dist/
          tar -czf mantle-linux.tar.gz -C dist target

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item -Recurse build\target dist\
          Compress-Archive -Path dist\target -DestinationPath mantle-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            mantle-linux.tar.gz
            mantle-windows.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mantle-linux/mantle-linux.tar.gz
            mantle-windows/mantle-windows.zip
          generate_release_notes: true