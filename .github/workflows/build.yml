name: CI

on:
  push:

permissions:
  contents: write

env:
  VULKAN_VER: 1.4.304.0

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.check.outputs.skipped }}
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Check commit message
        id: check
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip-ci-format]"* ]]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skipped == 'false'
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Install system deps
        if: steps.check.outputs.skipped == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ ninja-build \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev \
            mesa-common-dev libgl-dev

      - name: Cache Vulkan SDK
        if: steps.check.outputs.skipped == 'false'
        id: cache-vulkan-linux
        uses: actions/cache@v4
        with:
          path: .vulkansdk
          key: vulkan-sdk-${{ env.VULKAN_VER }}-linux

      - name: Install Vulkan SDK
        if: steps.check.outputs.skipped == 'false' && steps.cache-vulkan-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p .vulkansdk
          wget -qO- https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VER }}/linux/vulkansdk-linux-x86_64-${{ env.VULKAN_VER }}.tar.xz \
            | tar -xJ -C .vulkansdk

      - name: Set Vulkan env
        if: steps.check.outputs.skipped == 'false'
        run: |
          SDK="${GITHUB_WORKSPACE}/.vulkansdk/${{ env.VULKAN_VER }}/x86_64"
          echo "VULKAN_SDK=${SDK}" >> "${GITHUB_ENV}"
          echo "${SDK}/bin" >> "${GITHUB_PATH}"
          echo "LD_LIBRARY_PATH=${SDK}/lib:${LD_LIBRARY_PATH}" >> "${GITHUB_ENV}"

      - name: Configure for format
        if: steps.check.outputs.skipped == 'false'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DMANTLE_ENABLE_FORMAT=ON

      - name: Run format
        if: steps.check.outputs.skipped == 'false'
        run: cmake --build build --target mantle-format

      - name: Commit formatting changes
        id: commit
        if: steps.check.outputs.skipped == 'false'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Format code [skip-ci-format]"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:${GITHUB_REF_NAME}
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "committed=false" >> $GITHUB_OUTPUT
          fi


  build:
    needs: format
    if: |
      (needs.format.outputs.skipped == 'true') ||
      (needs.format.outputs.skipped == 'false' && needs.format.outputs.committed == 'false')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure: >
              cmake -B build -G Ninja
              -DCMAKE_BUILD_TYPE=RelWithDebInfo
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DMANTLE_ENABLE_FORMAT=OFF
            ctest: ctest --test-dir build --output-on-failure
            artifact: mantle-relwithdebinfo-linux-x64
          - os: windows-latest
            configure: >
              cmake -B build -G "Visual Studio 17 2022" -A x64 
              -DCMAKE_GENERATOR_PLATFORM=x64
              -DCMAKE_BUILD_TYPE=RelWithDebInfo
              -DMANTLE_ENABLE_FORMAT=OFF
            ctest: ctest --test-dir build --output-on-failure -C RelWithDebInfo
            artifact: mantle-relwithdebinfo-windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ ninja-build \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev \
            mesa-common-dev libgl-dev

      - name: Cache Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        id: cache-vulkan-linux
        uses: actions/cache@v4
        with:
          path: .vulkansdk
          key: vulkan-sdk-${{ env.VULKAN_VER }}-linux

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux' && steps.cache-vulkan-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p .vulkansdk
          wget -qO- https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VER }}/linux/vulkansdk-linux-x86_64-${{ env.VULKAN_VER }}.tar.xz \
            | tar -xJ -C .vulkansdk

      - name: Set Vulkan env (Linux)
        if: runner.os == 'Linux'
        run: |
          SDK="${GITHUB_WORKSPACE}/.vulkansdk/${{ env.VULKAN_VER }}/x86_64"
          echo "VULKAN_SDK=${SDK}" >> "${GITHUB_ENV}"
          echo "${SDK}/bin" >> "${GITHUB_PATH}"
          echo "LD_LIBRARY_PATH=${SDK}/lib:${LD_LIBRARY_PATH}" >> "${GITHUB_ENV}"

      - name: Cache Vulkan SDK installer (Windows)
        if: runner.os == 'Windows'
        id: cache-vulkan-win
        uses: actions/cache@v4
        with:
          path: ~\vulkansdk-${{ env.VULKAN_VER }}-installer.exe
          key: vulkan-sdk-installer-${{ env.VULKAN_VER }}

      - name: Download Vulkan SDK installer (Windows)
        if: runner.os == 'Windows' && steps.cache-vulkan-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VER }}/windows/VulkanSDK-${{ env.VULKAN_VER }}-Installer.exe"
          $out = "$env:USERPROFILE\vulkansdk-${{ env.VULKAN_VER }}-installer.exe"
          Write-Host "Downloading Vulkan SDK ($url)"
          $wc = New-Object System.Net.WebClient
          $wc.DownloadFile($url, $out)
          Write-Host "Download complete ($((Get-Item $out).Length / 1MB) MB)"

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = "$env:USERPROFILE\vulkansdk-${{ env.VULKAN_VER }}-installer.exe"
          $sdkPath = "C:\VulkanSDK\${{ env.VULKAN_VER }}"
          if (Test-Path "$sdkPath\Include\vulkan\vulkan.h") {
            Write-Host "Vulkan SDK already installed at $sdkPath"
          } else {
            Write-Host "Installing Vulkan SDK (this may take 3-5 min)..."
            $args = @(
              "--accept-licenses",
              "--default-answer",
              "--confirm-command",
              "install",
              "com.lunarg.vulkan.vma",
              "com.lunarg.vulkan.debug"
            )
            $p = Start-Process -FilePath $installer -ArgumentList $args -Wait -NoNewWindow -PassThru
            if ($p.ExitCode -ne 0) {
              throw "Installer failed with exit code $($p.ExitCode)"
            }
            Write-Host "Vulkan SDK installed"
          }

      - name: Set Vulkan env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "VULKAN_SDK=C:\VulkanSDK\${{ env.VULKAN_VER }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\VulkanSDK\${{ env.VULKAN_VER }}\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        shell: bash
        run: ${{ matrix.configure }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config RelWithDebInfo

      - name: Build (Linux)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Test
        run: ${{ matrix.ctest }}

      - name: Stage package (Linux)
        if: runner.os == 'Linux' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp -r build/target/* ${{ matrix.artifact }}/

      - name: Stage package (Windows)
        if: runner.os == 'Windows' && github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ matrix.artifact }}
          Copy-Item -Path build\target\* -Destination ${{ matrix.artifact }}\ -Recurse

      - name: Stage devinfo
        if: runner.os == 'Linux' && github.ref == 'refs/heads/master'
        run: cp build/devinfo/error_codes.json error_codes.json

      - name: Upload devinfo
        if: runner.os == 'Linux' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: mantle-devinfo
          path: error_codes.json
          if-no-files-found: error

      - name: Upload package
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error